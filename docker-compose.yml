# docker run --name=ffmpeg --volume=/home/ivan/testsrc.mpg:/testsrc.mpg --link rtsp-server --restart=always --detach=true jrottenberg/
# ffmpeg -re -stream_loop -1 -i /testsrc.mpg -c copy -f rtsp rtsp://rtsp-server:8554/mystream

version: "3.3"
services:
  generate-certs:
    image: alpine:latest
    volumes:
      - certs:/certs
      - ./scripts/generate-certs.sh:/generate-certs.sh:ro
    command: sh /generate-certs.sh
    restart: "no"

  rtsp-server:
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8554:8554"
      - "8888:8888"
    environment:
      - MTX_PROTOCOLS=tcp
    image: bluenviron/mediamtx
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  tls-proxy:
    restart: unless-stopped
    image: alpine/socat
    ports:
      - "322:8322"
    volumes:
      - certs:/certs:ro
    command: OPENSSL-LISTEN:8322,cert=/certs/server.crt,key=/certs/server.key,verify=0,reuseaddr,fork TCP:rtsp-server:8554
    depends_on:
      generate-certs:
        condition: service_completed_successfully
      rtsp-server:
        condition: service_started

  bambu-live:
    restart: unless-stopped
    image: linuxserver/ffmpeg:version-4.4-cli
    links:
      - "rtsp-server:rtsp-server"
    depends_on:
      - rtsp-server
    volumes:
      - ./samples/input_files/:/tmp/
    command: -re -stream_loop -1 -i /tmp/testsrc_01.mpg -vf scale=1920:1080 -c:v libx264 -an -f rtsp rtsp://rtsp-server:8554/streaming/live/1

  prepare-input-files:
    image: python:slim-bullseye
    working_dir: /app
    volumes:
       - ./samples/input_files/:/tmp/
       - ./scripts/list_input_files.py:/app/list_input_files.py
    command: python list_input_files.py /tmp/

volumes:
  certs:
